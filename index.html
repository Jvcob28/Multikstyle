<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MULTIK STYLE — ссылки</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  /* Палитра из логотипа MULTIK STYLE */
  :root{
    --cream:      #f2efdd;
    --cream-soft: #faf8ee;
    --blue:       #2e7ca8;
    --blue-deep:  #1d6390;
    --blue-light: #6fb3d6;
    --ink:        #16222b;   /* тёмная обводка как в комиксах */
    --pink:       #f2b8c6;
    --white:      #ffffff;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 15% 10%, rgba(111,179,214,.35), transparent 55%),
      radial-gradient(800px 500px at 90% 90%, rgba(46,124,168,.25), transparent 55%),
      var(--cream);
    overflow-x:hidden;
  }

  /* ===== Плавающие облачка и звёздочки ===== */
  .sky{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .cloud{
    position:absolute;
    width:90px; height:32px;
    background:var(--white);
    border-radius:50px;
    border:3px solid var(--ink);
    opacity:.85;
    animation:drift linear infinite;
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:var(--white);
    border:3px solid var(--ink);
    border-radius:50%;
  }
  .cloud::before{ width:34px; height:34px; top:-18px; left:14px; border-bottom:none; }
  .cloud::after{ width:24px; height:24px; top:-12px; left:46px; border-bottom:none; }
  @keyframes drift{
    from{ transform:translateX(-140px); }
    to{ transform:translateX(110vw); }
  }
  .star{
    position:absolute;
    color:var(--blue);
    font-size:18px;
    animation:twinkle ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ transform:scale(.7) rotate(0deg);  opacity:.35; }
    50%    { transform:scale(1.15) rotate(20deg); opacity:.9; }
  }

  /* ===== Карточка ===== */
  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:430px;
    text-align:center;
    padding:34px 28px 30px;
    border-radius:34px;
    background:var(--cream-soft);
    border:4px solid var(--ink);
    box-shadow:10px 12px 0 var(--ink), 10px 12px 0 2px var(--blue);
    animation:pop .7s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop{
    from{ opacity:0; transform:scale(.8) translateY(30px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
  }

  /* ===== Логотип ===== */
  .logo-wrap{
    position:relative;
    width:200px; height:200px;
    margin:0 auto 18px;
    animation:bounceIn 1s cubic-bezier(.34,1.56,.64,1) both .15s;
  }
  @keyframes bounceIn{
    from{ opacity:0; transform:scale(.5) rotate(-8deg); }
    to{ opacity:1; transform:scale(1) rotate(0); }
  }
  .logo-wrap img{
    width:100%; height:100%;
    object-fit:cover;
    border-radius:50%;
    border:5px solid var(--ink);
    box-shadow:0 0 0 6px var(--blue), 0 10px 24px -8px rgba(22,34,43,.45);
    animation:floaty 4s ease-in-out infinite;
  }
  @keyframes floaty{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%    { transform:translateY(-8px) rotate(1.5deg); }
  }
  /* Ушки-звёздочки вокруг лого */
  .logo-wrap::before, .logo-wrap::after{
    content:"\2726";
    position:absolute;
    color:var(--blue);
    font-size:26px;
    animation:twinkle 2.6s ease-in-out infinite;
  }
  .logo-wrap::before{ top:4px; left:-18px; }
  .logo-wrap::after{ bottom:14px; right:-16px; animation-delay:1.3s; }

  .title{
    font-family:'Baloo 2', cursive;
    font-size:34px;
    font-weight:800;
    letter-spacing:1px;
    color:var(--blue-deep);
    text-shadow:2px 2px 0 var(--white), 4px 4px 0 var(--ink);
    margin-bottom:6px;
    animation:pop .7s cubic-bezier(.34,1.56,.64,1) both .3s;
  }

  .tagline{
    font-size:14.5px;
    font-weight:700;
    color:var(--blue);
    margin-bottom:24px;
    animation:pop .6s ease both .45s;
  }

  .links{ display:flex; flex-direction:column; gap:14px; }

  .btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    border-radius:60px;
    text-decoration:none;
    color:var(--white);
    font-size:16px;
    font-weight:800;
    background:linear-gradient(180deg, var(--blue-light), var(--blue));
    border:3.5px solid var(--ink);
    box-shadow:0 5px 0 var(--ink);
    overflow:hidden;
    opacity:0;
    animation:btnPop .6s cubic-bezier(.34,1.56,.64,1) both;
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .btn:nth-child(1){ animation-delay:.55s; }
  .btn:nth-child(2){ animation-delay:.7s; }
  .btn:nth-child(3){ animation-delay:.85s; }
  .btn:nth-child(4){ animation-delay:1s; }
  .btn:nth-child(5){ animation-delay:1.15s; }
  @keyframes btnPop{
    from{ opacity:0; transform:scale(.7) translateY(16px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
  }

  .btn:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 8px 0 var(--ink);
    filter:brightness(1.06);
  }
  .btn:hover .icon{ animation:wiggle .5s ease; }
  @keyframes wiggle{
    0%,100%{ transform:rotate(0); }
    25%{ transform:rotate(-14deg) scale(1.15); }
    75%{ transform:rotate(12deg) scale(1.15); }
  }
  .btn:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 var(--ink);
  }

  .btn .icon{
    flex:0 0 40px;
    width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    background:var(--white);
    color:var(--blue-deep);
    border:3px solid var(--ink);
    border-radius:50%;
  }
  .btn .icon svg{ width:21px; height:21px; }

  .btn .label{
    flex:1; text-align:left;
    text-shadow:1.5px 1.5px 0 rgba(22,34,43,.35);
  }

  .btn .arrow{
    color:var(--white);
    opacity:.7;
    transition:transform .2s ease, opacity .2s ease;
  }
  .btn:hover .arrow{ transform:translateX(5px); opacity:1; }

  .footer{
    margin-top:24px;
    font-family:'Baloo 2', cursive;
    font-size:15px;
    font-weight:700;
    color:var(--blue);
    animation:pop .6s ease both 1.3s;
  }
  .footer .heart{
    display:inline-block;
    color:var(--pink);
    -webkit-text-stroke:1px var(--ink);
    animation:beat 1.4s ease-in-out infinite;
  }
  @keyframes beat{
    0%,100%{ transform:scale(1); }
    12%{ transform:scale(1.3); }
    24%{ transform:scale(1); }
  }

  .ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    background:rgba(255,255,255,.45);
    animation:ripple .6s linear;
    pointer-events:none;
  }
  @keyframes ripple{ to{ transform:scale(4); opacity:0; } }

  :focus-visible{ outline:3px solid var(--blue-deep); outline-offset:3px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .btn{ opacity:1; }
  }
</style>
</head>

   НАСТРОЙКА — меняй только здесь
   ============================================================ */
const CONFIG = {
  tagline: "Игрушки, которые дарят улыбки!",

  links: [
    { platform:"instagram", label:"Instagram",           url:"https://www.instagram.com/multikstyle_1/" },
    { platform:"instagram", label:"Instagram 2",         url:"https://www.instagram.com/multikstyle_world/" },
    { platform:"telegram",  label:"Telegram",            url:"t.me/multfilim_qahramonlari" },
    { platform:"phone",     label:"+998 99 526-03-80",   url:"tel:+998995260380" }
  ]
};

/* ====== Иконки ====== */
const ICONS = {
  instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.1" fill="currentColor" stroke="none"/></svg>',
  telegram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.94 4.64 18.9 19.2c-.23 1.02-.84 1.27-1.7.79l-4.7-3.47-2.27 2.18c-.25.25-.46.46-.95.46l.34-4.8 8.73-7.89c.38-.34-.08-.53-.59-.19L7.27 13.4l-4.65-1.45c-1.01-.32-1.03-1.01.21-1.5l18.18-7c.84-.31 1.58.19 1.31 1.69z"/></svg>',
  youtube:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 12s0-3.2-.41-4.74a2.46 2.46 0 0 0-1.73-1.74C19.32 5.1 12 5.1 12 5.1s-7.32 0-8.86.42A2.46 2.46 0 0 0 1.41 7.26C1 8.8 1 12 1 12s0 3.2.41 4.74a2.46 2.46 0 0 0 1.73 1.74c1.54.42 8.86.42 8.86.42s7.32 0 8.86-.42a2.46 2.46 0 0 0 1.73-1.74C23 15.2 23 12 23 12zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>',
  phone:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>'
};

const ARROW = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

/* ====== Сборка ====== */
document.getElementById("tagline").textContent = CONFIG.tagline;
document.getElementById("year").textContent    = new Date().getFullYear();

const wrap = document.getElementById("links");

CONFIG.links.forEach(item => {
  const a = document.createElement("a");
  a.className = "btn";
  a.href      = item.url;
  if (item.platform !== "phone") {
    a.target = "_blank";
    a.rel    = "noopener noreferrer";
  }
  a.setAttribute("aria-label", item.label);
  a.innerHTML =
    `<span class="icon">${ICONS[item.platform] || ""}</span>
     <span class="label">${item.label}</span>
     <span class="arrow">${ARROW}</span>`;

  a.addEventListener("click", function(e){
    const r = document.createElement("span");
    const d = Math.max(this.offsetWidth, this.offsetHeight);
    r.className = "ripple";
    r.style.width = r.style.height = d + "px";
    r.style.left = (e.offsetX - d/2) + "px";
    r.style.top  = (e.offsetY - d/2) + "px";
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });

  wrap.appendChild(a);
});

/* ====== Облака и звёздочки на фоне ====== */
const sky = document.getElementById("sky");
const isMobile = matchMedia("(max-width: 600px)").matches;

const CLOUDS = isMobile ? 3 : 5;
for (let i = 0; i < CLOUDS; i++){
  const c = document.createElement("div");
  c.className = "cloud";
  c.style.top = (5 + Math.random()*75) + "vh";
  c.style.animationDuration = (28 + Math.random()*30) + "s";
  c.style.animationDelay = (-Math.random()*40) + "s";
  const scale = .6 + Math.random()*.8;
  c.style.transform = "scale(" + scale + ")";
  sky.appendChild(c);
}

const STARS = isMobile ? 8 : 14;
for (let i = 0; i < STARS; i++){
  const s = document.createElement("span");
  s.className = "star";
  s.textContent = "\u2726";
  s.style.left = Math.random()*96 + "vw";
  s.style.top  = Math.random()*92 + "vh";
  s.style.fontSize = (12 + Math.random()*14) + "px";
  s.style.animationDuration = (2 + Math.random()*2.5) + "s";
  s.style.animationDelay = (Math.random()*3) + "s";
  sky.appendChild(s);
}
</script>
</body>
</html>
